<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robot Episode Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:     #0d1117;
    --panel:  #161b22;
    --border: #30363d;
    --text:   #c9d1d9;
    --muted:  #8b949e;
    --accent: #388bfd;
    --danger: #f85149;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

  /* ── App shell ── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px; height: 44px; flex-shrink: 0;
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  #sidebar-toggle {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 18px; line-height: 1; padding: 4px 6px; border-radius: 4px;
  }
  #sidebar-toggle:hover { color: var(--text); background: #21262d; }
  header h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
  header .sub { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Content row — sidebar is an overlay so #right takes full width ── */
  #content { position: relative; flex: 1; overflow: hidden; display: flex; }

  /* ── Sidebar — overlay drawer, never pushes the 3D canvas ── */
  #sidebar {
    position: absolute; top: 0; left: 0; bottom: 0; z-index: 20;
    width: 230px;
    background: rgba(18,24,32,0.96);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    transform: translateX(-100%);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    backdrop-filter: blur(8px);
  }
  #sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.6); }
  #sidebar-inner { width: 230px; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .sidebar-hdr { padding: 8px 12px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #ep-list { overflow-y: auto; flex: 1; }
  .ep { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #1e242c; display: flex; flex-direction: column; gap: 3px; }
  .ep:hover { background: #1e2530; }
  .ep.active { background: #1c2d48; border-left: 3px solid var(--accent); padding-left: 9px; }
  .ep-id { font-size: 12px; font-weight: 600; font-family: monospace; }
  .ep-sub { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .b-nominal              { background:#1a4a2a; color:#3fb950; }
  .b-velocity_spike       { background:#3d2800; color:#f0a500; }
  .b-stuck_joint          { background:#0d2d4a; color:#58a6ff; }
  .b-position_jerk        { background:#2d1a4a; color:#bc8cff; }
  .b-overshoot            { background:#3d2d00; color:#e3b341; }
  .b-trajectory_deviation { background:#1a3a2a; color:#39d353; }
  .b-unknown              { background:#2d2d2d; color:#8b949e; }
  /* Scrim that closes sidebar when clicking outside */
  #scrim { display:none; position:absolute; inset:0; z-index:19; background:rgba(0,0,0,0.4); }
  #scrim.on { display:block; }

  /* ── Right panel ── */
  #right { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ── 3D viewer ── */
  #viewer {
    position: relative; flex: 1; min-height: 0;
    background: #06090f;
  }
  #viewer canvas { display: block; }   /* Three.js controls canvas size entirely */

  /* HUD */
  #hud {
    position: absolute; top: 10px; left: 10px;
    background: rgba(10,14,20,0.85); border: 1px solid #2a3444;
    border-radius: 8px; padding: 9px 12px; font-size: 11px;
    line-height: 1.8; pointer-events: none; min-width: 160px;
    backdrop-filter: blur(4px);
  }
  .hl { color: var(--muted); margin-right: 4px; }
  .hv { font-family: monospace; color: var(--text); }
  #hud-class-val { font-weight: 600; }
  #hud-fail { color: var(--danger); font-weight: 700; display: none; }

  #hint {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; color: #4a5568; text-align: right;
    pointer-events: none; line-height: 1.6;
  }

  /* Failure overlay ring */
  #fail-ring {
    position: absolute; inset: 0; pointer-events: none;
    border: 0px solid transparent; border-radius: 0;
    transition: border-width 0.1s, border-color 0.1s;
    box-shadow: inset 0 0 0px transparent;
  }
  #fail-ring.on { box-shadow: inset 0 0 40px rgba(248,81,73,0.25); border: 2px solid rgba(248,81,73,0.4); }

  /* ── Chart panel ── */
  #chart-panel {
    height: 160px; flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 6px 12px 4px;
    background: #0d1117;
    position: relative;
  }
  #chart-panel canvas { width: 100% !important; height: 100% !important; }

  /* ── Controls bar ── */
  #ctrl-bar {
    height: 42px; flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    background: var(--panel); border-top: 1px solid var(--border);
  }
  .cbtn {
    background: #21262d; border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); cursor: pointer; font-size: 13px;
    width: 28px; height: 26px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .cbtn:hover { background: #2d3440; border-color: var(--accent); }
  #scrubber { flex: 1; accent-color: var(--accent); cursor: pointer; }
  #step-disp { font-size: 11px; color: var(--muted); font-family: monospace; min-width: 65px; text-align: right; }
  #speed-sel { background: #21262d; border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 11px; padding: 2px 5px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">

  <header>
    <button id="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
    <h1>Robot Episode Viewer</h1>
    <span class="sub">xArm 4-DOF &middot; 50 Hz &middot; Forward Kinematics</span>
  </header>

  <div id="content">
    <!-- Overlay drawer -->
    <div id="sidebar">
      <div id="sidebar-inner">
        <div class="sidebar-hdr">Episodes</div>
        <div id="ep-list"></div>
      </div>
    </div>
    <div id="scrim"></div>

    <div id="right">
      <div id="viewer">
        <!-- Three.js mounts canvas here -->
        <div id="hud">
          <div><span class="hl">Episode</span><span class="hv" id="hud-ep">—</span></div>
          <div><span class="hl">Class&nbsp;&nbsp;</span><span class="hv" id="hud-class-val">—</span></div>
          <div><span class="hl">Step&nbsp;&nbsp;&nbsp;</span><span class="hv" id="hud-step">—</span></div>
          <div><span class="hl">J1</span><span class="hv" id="hud-j1">—</span>&nbsp;<span class="hl">J2</span><span class="hv" id="hud-j2">—</span></div>
          <div><span class="hl">J3</span><span class="hv" id="hud-j3">—</span>&nbsp;<span class="hl">J4</span><span class="hv" id="hud-j4">—</span></div>
          <div id="hud-fail">&#9679; FAILURE DETECTED</div>
        </div>
        <div id="hint">Drag &middot; Scroll &middot; Right-drag</div>
        <div id="fail-ring"></div>
      </div>

      <div id="chart-panel">
        <canvas id="vel-chart"></canvas>
      </div>

      <div id="ctrl-bar">
        <button class="cbtn" id="btn-start" title="Start">&#9198;</button>
        <button class="cbtn" id="btn-play"  title="Play/Pause">&#9654;</button>
        <button class="cbtn" id="btn-end"   title="End">&#9197;</button>
        <input type="range" id="scrubber" min="0" max="100" value="0" />
        <span id="step-disp">0 / 0</span>
        <select id="speed-sel">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
      </div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── xArm 4-DOF FK constants (scaled for display) ─────────────────────────────
const S    = 2.8;
const D1   = 0.267 * S;   // base column
const A2   = 0.267 * S;   // upper arm
const A3   = 0.235 * S;   // forearm
const A4   = 0.110 * S;   // wrist / EE
const DT   = 0.02;

function fk(q) {
  const [q0, q1, q2, q3] = q;
  const cx = Math.cos(q0), sx = Math.sin(q0);
  const a1 = q1, a2 = q1 + q2, a3 = q1 + q2 + q3;
  const p0 = new THREE.Vector3(0, 0, 0);
  const p1 = new THREE.Vector3(0, D1, 0);
  const p2 = new THREE.Vector3(A2*Math.cos(a1)*cx, D1 + A2*Math.sin(a1), A2*Math.cos(a1)*sx);
  const p3 = new THREE.Vector3(p2.x + A3*Math.cos(a2)*cx, p2.y + A3*Math.sin(a2), p2.z + A3*Math.cos(a2)*sx);
  const p4 = new THREE.Vector3(p3.x + A4*Math.cos(a3)*cx, p3.y + A4*Math.sin(a3), p3.z + A4*Math.cos(a3)*sx);
  return [p0, p1, p2, p3, p4];
}

// ── Three.js scene ────────────────────────────────────────────────────────────
const viewer = document.getElementById('viewer');

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.setClearColor(0x06090f);
viewer.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x06090f, 12, 20);

// Camera — framed so the full arm is visible with the arm occupying ~60% of height
const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 50);
camera.position.set(2.4, 1.8, 2.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0.75, 0.82, 0);   // midpoint of the extended arm
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 0.3;
controls.maxDistance = 10;
controls.update();

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x8899aa, 0.6));

const sun = new THREE.DirectionalLight(0xfff0e0, 1.1);
sun.position.set(5, 8, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far  = 30;
sun.shadow.camera.left = sun.shadow.camera.bottom = -5;
sun.shadow.camera.right = sun.shadow.camera.top   =  5;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x6688ff, 0.4);
fill.position.set(-3, 2, -3);
scene.add(fill);

const rimLight = new THREE.PointLight(0x4499ff, 0.6, 8);
rimLight.position.set(-1, 2, -1);
scene.add(rimLight);

// ── Floor grid ────────────────────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(8, 24, 0x1e2a3a, 0x131e28);
gridHelper.receiveShadow = true;
scene.add(gridHelper);

// Floor shadow-receiver plane
const floorMat = new THREE.ShadowMaterial({ opacity: 0.25 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.001;
floor.receiveShadow = true;
scene.add(floor);

// ── Materials (shared, mutated on failure) ────────────────────────────────────
const matLink  = new THREE.MeshStandardMaterial({ color: 0x3a7fd6, metalness: 0.55, roughness: 0.35 });
const matJoint = new THREE.MeshStandardMaterial({ color: 0x5ba3f5, metalness: 0.65, roughness: 0.25 });
const matEE    = new THREE.MeshStandardMaterial({ color: 0xe8f0ff, metalness: 0.8, roughness: 0.15, emissive: 0x113366, emissiveIntensity: 0.3 });
const matBase  = new THREE.MeshStandardMaterial({ color: 0x2e3640, metalness: 0.7, roughness: 0.4 });

// ── Robot group ───────────────────────────────────────────────────────────────
const robot = new THREE.Group();
scene.add(robot);

// Base platform
const basePlat = new THREE.Mesh(
  new THREE.CylinderGeometry(0.22, 0.26, 0.07, 32),
  matBase.clone()
);
basePlat.position.y = 0.035;
basePlat.castShadow = basePlat.receiveShadow = true;
robot.add(basePlat);

// Base column (link 0)
const baseCol = new THREE.Mesh(
  new THREE.CylinderGeometry(0.045, 0.055, D1, 16),
  matLink.clone()
);
baseCol.position.y = D1 / 2;
baseCol.castShadow = true;
robot.add(baseCol);

// Links 1-3 (upper arm, forearm, wrist)
const LINK_R = [0.040, 0.034, 0.026];
const LINK_L = [A2, A3, A4];
const linkMeshes = LINK_L.map((len, i) => {
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(LINK_R[i], LINK_R[i] * 0.85, len, 14),
    matLink.clone()
  );
  m.castShadow = true;
  robot.add(m);
  return m;
});

// Joint spheres (shoulder, elbow, wrist, end-effector)
const JR = [0.068, 0.056, 0.046, 0.038];
const jointMeshes = JR.map((r, i) => {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(r, 20, 20),
    i === 3 ? matEE.clone() : matJoint.clone()
  );
  m.castShadow = true;
  robot.add(m);
  return m;
});

// EE glow ring
const eeRing = new THREE.Mesh(
  new THREE.TorusGeometry(0.055, 0.008, 8, 24),
  new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x224488, emissiveIntensity: 0.8, metalness: 0.3, roughness: 0.5 })
);
robot.add(eeRing);

// ── Trajectory lines ──────────────────────────────────────────────────────────
// Full episode ghost path (faint)
const ghostGeo = new THREE.BufferGeometry();
const ghostMat = new THREE.LineBasicMaterial({ color: 0x1e3a5a, transparent: true, opacity: 0.5 });
const ghostLine = new THREE.Line(ghostGeo, ghostMat);
scene.add(ghostLine);

// Active trail (last N steps, bright)
const TRAIL_LEN = 35;
const trailGeo = new THREE.BufferGeometry();
const trailMat = new THREE.LineBasicMaterial({ color: 0x4a90d9, transparent: true, opacity: 0.85 });
const trailLine = new THREE.Line(trailGeo, trailMat);
scene.add(trailLine);

// ── Helper: orient a cylinder between two points ──────────────────────────────
const _dir = new THREE.Vector3();
const _mid = new THREE.Vector3();
const _up  = new THREE.Vector3(0, 1, 0);

function setCylinder(mesh, p1, p2) {
  _dir.subVectors(p2, p1);
  _mid.addVectors(p1, p2).multiplyScalar(0.5);
  mesh.position.copy(_mid);
  if (_dir.lengthSq() > 1e-8) {
    mesh.quaternion.setFromUnitVectors(_up, _dir.normalize());
  }
}

// ── Update robot pose ─────────────────────────────────────────────────────────
function updateRobot(step, isFailure) {
  if (!episodeData) return;

  const joints = fk(episodeData.joint_positions[step]);
  const lc = isFailure ? 0xcc2233 : 0x3a7fd6;
  const jc = isFailure ? 0xff4455 : 0x5ba3f5;
  const ec = isFailure ? 0xff8888 : 0xe8f0ff;

  // Base column rotates with q0 — just update its color
  baseCol.material.color.setHex(lc);
  // Rotate entire robot group by base joint angle
  robot.rotation.y = 0;   // FK handles base rotation inside fk()

  // Links
  setCylinder(baseCol, joints[0], joints[1]);
  setCylinder(linkMeshes[0], joints[1], joints[2]);
  setCylinder(linkMeshes[1], joints[2], joints[3]);
  setCylinder(linkMeshes[2], joints[3], joints[4]);
  for (const m of linkMeshes) m.material.color.setHex(lc);

  // Joints
  for (let i = 0; i < 4; i++) {
    jointMeshes[i].position.copy(joints[i + 1]);
    jointMeshes[i].material.color.setHex(i === 3 ? ec : jc);
    if (i === 3) jointMeshes[i].material.emissive.setHex(isFailure ? 0x440000 : 0x113366);
  }

  // EE ring (orbits around end-effector)
  eeRing.position.copy(joints[4]);
  const wristFwd = new THREE.Vector3().subVectors(joints[4], joints[3]).normalize();
  eeRing.quaternion.setFromUnitVectors(_up, wristFwd);
  eeRing.material.color.setHex(isFailure ? 0xff4444 : 0x88ccff);
  eeRing.material.emissive.setHex(isFailure ? 0x440000 : 0x224488);

  // Update active trail
  if (episodeData) {
    const start = Math.max(0, step - TRAIL_LEN);
    const pts = [];
    for (let i = start; i <= step; i++) {
      pts.push(fk(episodeData.joint_positions[i])[4]);
    }
    trailGeo.setFromPoints(pts);
    trailMat.color.setHex(isFailure ? 0xff4444 : 0x4a90d9);
  }
}

// ── Precompute full EE path for ghost line ────────────────────────────────────
function buildGhostPath() {
  if (!episodeData) { ghostGeo.setFromPoints([]); return; }
  ghostGeo.setFromPoints(episodeData.joint_positions.map(q => fk(q)[4]));
}

// ── Resize ────────────────────────────────────────────────────────────────────
function resize() {
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  if (w === 0 || h === 0) return;
  renderer.setSize(w, h);    // Three.js sets canvas pixel dims; no CSS conflict
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(viewer);
resize();

// ── Animation loop ────────────────────────────────────────────────────────────
let isPlaying = false;
let playSpeed = 1.0;
let currentStep = 0;
let episodeData = null;
let lastTS = null;
let accTime = 0;

function setPlaying(v) {
  isPlaying = v;
  document.getElementById('btn-play').innerHTML = v ? '&#9646;&#9646;' : '&#9654;';
  if (!v) lastTS = null;
}

function animate(ts) {
  requestAnimationFrame(animate);
  controls.update();

  if (isPlaying && episodeData) {
    if (lastTS === null) lastTS = ts;
    accTime += (ts - lastTS) / 1000 * playSpeed;
    lastTS = ts;
    const steps = Math.floor(accTime / DT);
    if (steps > 0) {
      accTime -= steps * DT;
      currentStep = Math.min(currentStep + steps, episodeData.n_timesteps - 1);
      if (currentStep >= episodeData.n_timesteps - 1) setPlaying(false);
      syncUI();
    }
  } else {
    lastTS = null;
  }

  const isFailure = episodeData && episodeData.failure_step >= 0 && currentStep >= episodeData.failure_step;
  updateRobot(currentStep, isFailure);
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// ── Velocity chart ────────────────────────────────────────────────────────────
const stepLinePlugin = {
  id: 'stepLine',
  afterDraw(chart) {
    if (!episodeData) return;
    const { ctx, scales: { x, y } } = chart;
    // Failure line
    if (episodeData.failure_step >= 0) {
      const fx = x.getPixelForValue(episodeData.failure_step);
      ctx.save();
      ctx.strokeStyle = 'rgba(248,81,73,0.7)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(fx, y.top); ctx.lineTo(fx, y.bottom); ctx.stroke();
      ctx.restore();
    }
    // Current step line
    const cx2 = x.getPixelForValue(currentStep);
    ctx.save();
    ctx.strokeStyle = 'rgba(190,210,240,0.9)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx2, y.top); ctx.lineTo(cx2, y.bottom); ctx.stroke();
    ctx.restore();
  }
};
Chart.register(stepLinePlugin);

const JOINT_COLORS = ['#4a90d9','#e05c5c','#4dc4a0','#c889e0'];

const velChart = new Chart(
  document.getElementById('vel-chart').getContext('2d'),
  {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8b949e', boxWidth: 10, font: { size: 10 } } },
        tooltip: {
          backgroundColor: 'rgba(16,22,32,0.95)',
          titleColor: '#c9d1d9', bodyColor: '#8b949e',
          borderColor: '#30363d', borderWidth: 1,
          callbacks: { label: c => ` J${c.datasetIndex+1}: ${c.parsed.y.toFixed(3)} rad/s` }
        }
      },
      scales: {
        x: { ticks: { color:'#555f6e', maxTicksLimit:8, font:{size:9} }, grid: { color:'#131e28' },
             title: { display:true, text:'Step', color:'#555f6e', font:{size:9} } },
        y: { ticks: { color:'#555f6e', font:{size:9} }, grid: { color:'#131e28' },
             title: { display:true, text:'Velocity (rad/s)', color:'#555f6e', font:{size:9} } }
      }
    }
  }
);

function loadChart() {
  if (!episodeData) return;
  const n = episodeData.n_timesteps;
  velChart.data.labels = Array.from({length: n}, (_, i) => i);
  velChart.data.datasets = Array.from({length: 4}, (_, j) => ({
    label: `J${j+1}`,
    data: episodeData.joint_velocities.map(v => v[j] ?? 0),
    borderColor: JOINT_COLORS[j],
    backgroundColor: 'transparent',
    borderWidth: 1.5,
    pointRadius: 0,
    tension: 0.3,
  }));

  // Failure zone background
  if (episodeData.failure_step >= 0) {
    const fs = episodeData.failure_step;
    velChart.data.datasets.push({
      label: '',
      data: Array.from({length: n}, (_, i) => i >= fs ? 0 : null),
      backgroundColor: 'rgba(248,81,73,0.07)',
      borderColor: 'transparent',
      fill: { above: 'rgba(248,81,73,0.07)', target: 'origin' },
      pointRadius: 0,
      order: 10,
    });
  }
  velChart.update('none');
}

// ── UI sync ───────────────────────────────────────────────────────────────────
function syncUI() {
  if (!episodeData) return;
  const isF = episodeData.failure_step >= 0 && currentStep >= episodeData.failure_step;
  const q = episodeData.joint_positions[currentStep];

  document.getElementById('scrubber').value = currentStep;
  document.getElementById('step-disp').textContent = `${currentStep} / ${episodeData.n_timesteps - 1}`;
  document.getElementById('hud-step').textContent = `${currentStep}`;
  document.getElementById('hud-j1').textContent = q[0].toFixed(3);
  document.getElementById('hud-j2').textContent = q[1].toFixed(3);
  document.getElementById('hud-j3').textContent = q[2].toFixed(3);
  document.getElementById('hud-j4').textContent = (q[3]??0).toFixed(3);

  const failEl = document.getElementById('hud-fail');
  failEl.style.display = isF ? 'block' : 'none';
  if (isF) failEl.textContent = `\u25cf ${episodeData.failure_class.toUpperCase().replace(/_/g,' ')}`;

  document.getElementById('fail-ring').className = isF ? 'on' : '';
  velChart.update('none');
}

// ── Episode loading ───────────────────────────────────────────────────────────
const FC_COLORS = {
  nominal:'#3fb950', velocity_spike:'#f0a500', stuck_joint:'#58a6ff',
  position_jerk:'#bc8cff', overshoot:'#e3b341', trajectory_deviation:'#39d353', unknown:'#8b949e'
};

async function loadEpisode(id) {
  const res = await fetch(`/api/episodes/${id}`);
  if (!res.ok) return;
  episodeData = await res.json();
  currentStep = 0; accTime = 0;
  setPlaying(false);

  document.getElementById('scrubber').max = episodeData.n_timesteps - 1;
  document.getElementById('hud-ep').textContent = episodeData.id;
  const cv = document.getElementById('hud-class-val');
  cv.textContent = episodeData.failure_class;
  cv.style.color = FC_COLORS[episodeData.failure_class] || '#8b949e';

  buildGhostPath();
  loadChart();
  syncUI();
}

async function loadEpisodeList() {
  const res = await fetch('/api/episodes');
  const eps = await res.json();
  const list = document.getElementById('ep-list');
  list.innerHTML = '';

  for (const ep of eps) {
    const el = document.createElement('div');
    el.className = 'ep';
    el.dataset.id = ep.id;
    const bc = `b-${ep.failure_class}`;
    const failInfo = ep.failure_step >= 0 ? `· fail@${ep.failure_step}` : '';
    el.innerHTML = `
      <div class="ep-id">${ep.id}</div>
      <div class="ep-sub">
        <span class="badge ${bc}">${ep.failure_class}</span>
        ${ep.n_timesteps}&#8239;steps ${failInfo}
      </div>`;
    el.addEventListener('click', async () => {
      document.querySelectorAll('.ep').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      await loadEpisode(ep.id);
    });
    list.appendChild(el);
  }

  if (eps.length > 0) {
    list.firstChild.classList.add('active');
    await loadEpisode(eps[0].id);
  }
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', () => {
  if (!episodeData) return;
  if (currentStep >= episodeData.n_timesteps - 1) currentStep = 0;
  setPlaying(!isPlaying);
});
document.getElementById('btn-start').addEventListener('click', () => { currentStep = 0; setPlaying(false); syncUI(); });
document.getElementById('btn-end').addEventListener('click', () => {
  if (episodeData) { currentStep = episodeData.n_timesteps - 1; setPlaying(false); syncUI(); }
});
document.getElementById('scrubber').addEventListener('input', e => {
  currentStep = +e.target.value; setPlaying(false); syncUI();
});
document.getElementById('speed-sel').addEventListener('change', e => { playSpeed = +e.target.value; });

function toggleSidebar(forceClose) {
  const s = document.getElementById('sidebar');
  const sc = document.getElementById('scrim');
  const open = forceClose ? false : !s.classList.contains('open');
  s.classList.toggle('open', open);
  sc.classList.toggle('on', open);
}
document.getElementById('sidebar-toggle').addEventListener('click', () => toggleSidebar());
document.getElementById('scrim').addEventListener('click', () => toggleSidebar(true));

window.addEventListener('keydown', e => {
  if (!episodeData) return;
  const n = episodeData.n_timesteps;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('btn-play').click(); }
  else if (e.code === 'ArrowLeft')  { currentStep = Math.max(0, currentStep-1); setPlaying(false); syncUI(); }
  else if (e.code === 'ArrowRight') { currentStep = Math.min(n-1, currentStep+1); setPlaying(false); syncUI(); }
  else if (e.code === 'Home') { currentStep = 0; setPlaying(false); syncUI(); }
  else if (e.code === 'End')  { currentStep = n-1; setPlaying(false); syncUI(); }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
loadEpisodeList();
</script>
</body>
</html>
